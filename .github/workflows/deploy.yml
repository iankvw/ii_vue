name: Production-grade CI-CD Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  # ==================================================
  # [STAGE 1] Build & Bundling Optimization
  # ==================================================
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Fetch Source Code Repository
        uses: actions/checkout@v4

      - name: Initialize Node.js Development Environment
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies and Execute Production Build
        run: |
          npm ci
          npm run build

      - name: Upload and Persist Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist/

  # ==================================================
  # [STAGE 2] Automated Canary Environment Deployment
  # ==================================================
  deploy-canary:
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist/

      - name: Inject Cloudflare Zero Trust Client and SSH Key
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          
          mkdir -p ~/.ssh
          cat << 'EOF' > ~/.ssh/id_ed25519
          ${{ secrets.SSH_KEY }}
          EOF
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/id_ed25519
          
          cat >> ~/.ssh/config << 'EOF'
          Host ${{ secrets.CANARY_HOST }}
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
            ProxyCommand /usr/local/bin/cloudflared access ssh --id "${{ secrets.CF_ACCESS_CLIENT_ID }}" --secret "${{ secrets.CF_ACCESS_CLIENT_SECRET }}" --hostname %h
          EOF

      - name: Transmit Artifacts to Canary Infrastructure Via Cloudflare Tunnel
        run: rsync -avz --delete dist/ ${{ secrets.SSH_USER }}@${{ secrets.CANARY_HOST }}:/home/ubuntu/docker/ii_vue/

  # ==================================================
  # [STAGE 3] Orchestrated Production Multi-Server Deployment (Manual Approval Gate Enabled)
  # ==================================================
  deploy-production:
    needs: deploy-canary
    runs-on: ubuntu-latest
    environment: production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    strategy:
      matrix:
        server: [AMPERE_HOST]

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist/

      - name: Inject Cloudflare Zero Trust Client and SSH Key
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          
          mkdir -p ~/.ssh
          cat << 'EOF' > ~/.ssh/id_ed25519
          ${{ secrets.SSH_KEY }}
          EOF
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/id_ed25519
          
          cat >> ~/.ssh/config << EOF
          Host ${{ secrets[matrix.server] }}
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
            ProxyCommand /usr/local/bin/cloudflared access ssh --id "${{ secrets.CF_ACCESS_CLIENT_ID }}" --secret "${{ secrets.CF_ACCESS_CLIENT_SECRET }}" --hostname %h
          EOF

      - name: Parallel Deployment and Syncing to Production Servers
        run: rsync -avz --delete dist/ ${{ secrets.SSH_USER }}@${{ secrets[matrix.server] }}:/home/ubuntu/docker/ii_vue/