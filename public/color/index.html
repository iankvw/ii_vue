<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Design System</title>
    <style>
        :root {
            --color-main: #A91D3A;
            --color-main-hover: #C12745;
            --color-main-active: #8E1831;
            --color-main-disabled: #D9A5B0;

            --color-bg: #F8F9FA;
            --color-text: #212529;
            --color-border: #DEE2E6;
            --color-white: #FFFFFF;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
            margin: 0;
            padding: 60px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 650px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--color-main);
            margin-bottom: 10px;
        }

        p {
            opacity: 0.7;
            font-weight: 500;
        }

        .main-section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
            padding-left: 10px;
            border-left: 4px solid var(--color-main);
        }

        .color-card {
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .color-card:hover {
            transform: translateY(-5px);
        }

        .color-card.large {
            height: 200px;
            margin-bottom: 30px;
        }

        .color-card.small {
            height: 120px;
        }

        .hex-code {
            font-family: 'Cascadia Code', Consolas, monospace;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .color-name {
            font-size: 0.9rem;
            margin-top: 8px;
            opacity: 0.9;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .white-text { color: #FFF; }
        .dark-text { color: var(--color-text); }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Server Color Guide</h1>
            <p>UI 통합 색상 가이드라인</p>
        </header>

        <div class="main-section">
            <div class="section-title">Primary Color</div>
            <div class="color-card large white-text" style="background-color: var(--color-main);">
                <div class="hex-code">#A91D3A</div>
                <div class="color-name">Main Deep Red</div>
            </div>
        </div>

        <div class="main-section">
            <div class="section-title">Interaction State</div>
            <div class="color-grid">
                <div class="color-card small white-text" style="background-color: var(--color-main-hover);">
                    <div class="hex-code">#C12745</div>
                    <div class="color-name">Hover</div>
                </div>
                <div class="color-card small white-text" style="background-color: var(--color-main-active);">
                    <div class="hex-code">#8E1831</div>
                    <div class="color-name">Active</div>
                </div>
                <div class="color-card small white-text" style="background-color: var(--color-main-disabled);">
                    <div class="hex-code">#D9A5B0</div>
                    <div class="color-name">Disabled</div>
                </div>
            </div>
        </div>

        <div class="main-section">
            <div class="section-title">System & Base</div>
            <div class="color-grid">
                <div class="color-card small dark-text" style="background-color: var(--color-bg); border: 1px solid var(--color-border);">
                    <div class="hex-code">#F8F9FA</div>
                    <div class="color-name">Background</div>
                </div>
                <div class="color-card small white-text" style="background-color: var(--color-text);">
                    <div class="hex-code">#212529</div>
                    <div class="color-name">Main Text</div>
                </div>
                <div class="color-card small dark-text" style="background-color: var(--color-border);">
                    <div class="hex-code">#DEE2E6</div>
                    <div class="color-name">Border & Divider</div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
