<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실습 8-4</title>
    <link href="files/mystyle.css" type="text/css" rel="stylesheet">
    <style>
        table {
            color: blue;
            background-color: mistyrose;
            font-size: 3em;
            font-style: italic;
            font-weight: bold;
            border: 1px solid magenta;
        }

        td {
            padding: 5px 10px;
            font-family: sans-serif;
        }

        #msg {
            color: magenta;
            font-family: sans-serif;
            font-style: italic;
        }
    </style>
    <script>
        let gameon = true
        let gameArray = [-1, -1, -1]

        function gen(obj, num) {
            if (gameon == false) return
            else if (gameArray[num] != -1) return

            let n = Math.floor(Math.random() * 30)
            gameArray[num] = n
            obj.innerHTML = n

            if (gameArray[0] != -1 && gameArray[1] != -1 && gameArray[2] != -1) {
                gameon = false
                let msgdiv = document.getElementById("msg")
                if (gameArray[0] == gameArray[1] && gameArray[0] == gameArray[2]) {
                    msgdiv.innerHTML = "Success(click here to do again)"
                }
                else {
                    msgdiv.innerHTML = "fail(click here to do again)"
                }
            }
        }
        function reset() {
            gameon = true
            gameArray = [-1, -1, -1]
            document.getElementById("msg").innerHTML = ""
            document.getElementById("first").innerHTML = "0";
            document.getElementById("second").innerHTML = "0";
            document.getElementById("third").innerHTML = "0";
        }
    </script>
</head>

<body>
    <h3>겜블링 게임</h3>
    각 숫자를 클릭하면 0에서 2사이의 난수로 바뀝니다. 모두 같은 수가 나오면 승리합니다.
    <hr>
    <table>
        <tr>
            <td id="first" onclick="gen(this, 0)">0</td>
            <td id="second" onclick="gen(this, 1)">0</td>
            <td id="third" onclick="gen(this, 2)">0</td>
        </tr>
    </table>
    <div id="msg" onclick="reset()"></div>
</body>

</html>
