<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실습 8-1</title>
    <link href="files/mystyle.css" type="text/css" rel="stylesheet">
    <style>
        span {
            visibility: hidden;
        }
    </style>
    <script>
        function showhide() {
            let spantext = document.getElementsByTagName("span")
            for (let i = 0; i < spantext.length; i++) {
                if (spantext[i].style.visibility === "hidden" || spantext[i].style.visibility === "") {
                    spantext[i].style.visibility = "visible";
                } else {
                    spantext[i].style.visibility = "hidden";
                }
            }
        }
    </script>
</head>

<body>
    <h3>
        다음 빈 곳에 숨은 단어?
        <button onclick="showhide()">show/hide</button>
    </h3>
    <hr>
    <ul>
        <li>I (<span>love</span>) you.</li>
        <li>CSS is Cascading (<span>Style</span>) Sheet.</li>
        <li>응답하라 (<span>1988</span>).</li>
    </ul>
</body>

</html>
