<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실습 8-3</title>
    <link href="files/mystyle.css" type="text/css" rel="stylesheet">
    <script>
        function addAnswer(obj, answer) {
            let parent = obj.parentElement
            if (obj != parent.lastElementChild) return //정답이 두 번 이상 표시되지 않도록 함
            let new_p = document.createElement("p")
            new_p.innerHTML = answer
            parent.appendChild(new_p)
            //정답 제거
            new_p.onclick = function () {
                let par = this.parentElement
                par.removeChild(this)
            }
        }
    </script>
</head>

<body>
    <h3>정답의 동적 삽입</h3>
    <hr>
    <div>
        <p>Q. 거울아 거울아 세상에서 누가 제일 예쁘니?</p>
        <button onclick="addAnswer(this, '백설공주')">답보기</button>
    </div>
    <div>
        <p>Q. 죽느냐 사느냐 어떤 것이 문제인가?</p>
        <button onclick="addAnswer(this, '둘다')">답보기</button>
    </div>
</body>

</html>
