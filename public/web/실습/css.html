<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>태그 셀렉터 만들기와 텍스트 꾸미기</title>
    <style>
        * {background: mistyrose; color: purple; font-family: "새굴림"; font-size: 12px;}
        h3 {text-align: center; font-weight: bold;}
        span {font-size: 1.5em; font-weight: bold;}
    </style>
</head>
<body>
    <h3>태그 셀렉터 만들기와 텍스트 꾸미기</h3>
    <hr>
    <p>저는 성공회대학교 김이언입니다. <span>웹개발입문</span> 수업을 들으면서 <span>웹 페이지</span>를 mistyrose 바탕색에 글씨는 purple 색의 "새굴림" 폰트로 12px 크기로 만들고 있어요.</p>
    <p><span style="font-weight: normal; background-color: yellow; text-decoration: underline;">여기에 있는 글씨는 특별히 yellow 바탕색에 앞의 글씨보다 1.5배 크게 하고 밑줄을 그어 작성해보았어요.</span></p>
    <p>제가 다니는 성공회대학교를 보려면 <a href="skhu.ac.kr">여기</a>를 클릭해보세요.</p>
</body>
</html>
