<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOL Controller</title>
    <style>
        :root {
            --bg-color: #F8F9FA;
            --card-bg: #FFF;
            --primary-color: #A91D3A;
            --primary-hover: #C12745;
            --text-main: #212529;
            --text-muted: #868E96;
            --border-color: #DEE2E6;
            --star-color: #F5B041;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            --radius: 14px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 20px;
        }

        .main-wrapper {
            width: 100%;
            max-width: 650px;
            margin: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /**
         * 카드 컴포넌트
         */
        .card {
            background-color: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px 20px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        }

        /**
         * 상호작용 엘리먼트
         */
        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
            padding: 4px;
        }

        .icon-btn.active, .icon-btn:hover {
            color: var(--star-color);
        }

        .input-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 0;
        }

        .input-group input {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .input-group input:focus {
            border-color: var(--primary-color);
        }

        #rawIp { width: calc(100% - 88px); }
        
        #rawPort { max-width: 80px; float: right; }

        .saved-name {
            flex: 1;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
        }

        .action-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 10px 16px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            transition: background-color 0.2s ease;
        }

        .action-btn:hover {
            background-color: var(--primary-hover);
        }

        .action-btn.delete {
            background-color: #e74c3c;
        }
        .action-btn.delete:hover {
            background-color: #c0392b;
        }

        /**
         * 모달 오버레이 UI
         */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 1000;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 24px;
            border-radius: var(--radius);
            width: 90%;
            max-width: 320px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .modal-message {
            font-size: 15px;
            color: var(--text-main);
            margin: 8px 0 16px 0;
            word-break: keep-all;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .modal-actions .cancel-btn {
            background-color: var(--border-color);
            color: var(--text-main);
        }

        .modal-actions .cancel-btn:hover {
            background-color: var(--text-muted);
            color: white;
        }

    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="card" id="mainInputCard">
            <button class="icon-btn" onclick="openSaveModal()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                </svg>
            </button>
            
            <div class="input-group">
                <div class="inline-inputs">
                    <input type="text" id="rawIp" placeholder="IP 주소">
                    <input type="number" id="rawPort" placeholder="포트">
                </div>
                <input type="text" id="rawMac" placeholder="MAC 주소">
            </div>

            <button class="action-btn" onclick="sendWolFromInput()">PC 켜기</button>
        </div>

        <div id="savedDevicesContainer" style="display: flex; flex-direction: column; gap: 16px;"></div>
    </div>

    <div class="modal-overlay" id="saveModal">
        <div class="modal-content">
            <h3 style="font-size: 18px;">디바이스 저장</h3>
            <div class="input-group">
                <input type="text" id="modalPcName" placeholder="PC 이름을 입력하세요">
            </div>
            <div class="modal-actions">
                <button class="action-btn cancel-btn" onclick="closeSaveModal()">취소</button>
                <button class="action-btn" onclick="saveDevice()">확인</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="alertModal">
        <div class="modal-content">
            <div class="modal-message" id="alertMessage"></div>
            <div class="modal-actions">
                <button class="action-btn" onclick="closeAlertModal()" style="width: 100%;">확인</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="confirmModal">
        <div class="modal-content">
            <div class="modal-message" id="confirmMessage">정말 삭제하시겠습니까?</div>
            <div class="modal-actions">
                <button class="action-btn cancel-btn" onclick="closeConfirmModal(false)">취소</button>
                <button class="action-btn" onclick="closeConfirmModal(true)">확인</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * State Management
         */
        let savedDevices = JSON.parse(localStorage.getItem('wol_devices')) || [];
        
        // Confirm 모달에서 실행할 콜백 함수 참조를 저장하는 전역 변수
        let confirmCallback = null;

        // 초기 마운트 시 저장된 리스트 렌더링
        document.addEventListener('DOMContentLoaded', renderSavedDevices);

        /**
         * Custom UI Modal Controllers
         */
        function showCustomAlert(message) {
            document.getElementById('alertMessage').innerText = message;
            document.getElementById('alertModal').classList.add('show');
        }

        function closeAlertModal() {
            document.getElementById('alertModal').classList.remove('show');
        }

        function showCustomConfirm(message, callback) {
            document.getElementById('confirmMessage').innerText = message;
            document.getElementById('confirmModal').classList.add('show');
            confirmCallback = callback;
        }

        function closeConfirmModal(isConfirmed) {
            document.getElementById('confirmModal').classList.remove('show');
            if (isConfirmed && confirmCallback) {
                confirmCallback();
            }
            confirmCallback = null;
        }

        function openSaveModal() {
            const ip = document.getElementById('rawIp').value.trim();
            const mac = document.getElementById('rawMac').value.trim();
            
            if (!ip || !mac) {
                showCustomAlert('IP 주소와 MAC 주소를 입력하세요.');
                return;
            }
            document.getElementById('saveModal').classList.add('show');
            document.getElementById('modalPcName').focus();
        }

        function closeSaveModal() {
            document.getElementById('saveModal').classList.remove('show');
            document.getElementById('modalPcName').value = '';
        }

        /**
         * Network Request Logic
         */
        async function triggerWakeOnLan(ip, mac, port) {
            if (!ip || !mac) {
                showCustomAlert('IP 주소와 MAC 주소를 입력하세요.');
                return;
            }

            try {
                const payload = { targetIp: ip, macAddress: mac, port: port || 9 };
                const response = await fetch('/api/v1/wol', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                showCustomAlert(result.message);
            } catch (error) {
                console.error('Fetch API Error:', error);
                showCustomAlert('서버와의 통신에 실패했습니다.');
            }
        }

        function sendWolFromInput() {
            const ip = document.getElementById('rawIp').value.trim();
            const mac = document.getElementById('rawMac').value.trim();
            const port = document.getElementById('rawPort').value.trim();
            triggerWakeOnLan(ip, mac, port);
        }

        function sendWolFromSaved(index) {
            const device = savedDevices[index];
            triggerWakeOnLan(device.ip, device.mac, device.port);
        }

        /**
         * State Mutation Logic
         */
        function saveDevice() {
            const name = document.getElementById('modalPcName').value.trim();
            const ip = document.getElementById('rawIp').value.trim();
            const mac = document.getElementById('rawMac').value.trim();
            const port = document.getElementById('rawPort').value.trim();

            if (!name) {
                showCustomAlert('PC 이름을 입력하세요.');
                return;
            }

            savedDevices.push({ name, ip, mac, port });
            localStorage.setItem('wol_devices', JSON.stringify(savedDevices));
            
            // 입력 폼 초기화
            document.getElementById('rawIp').value = '';
            document.getElementById('rawMac').value = '';
            document.getElementById('rawPort').value = '';
            
            closeSaveModal();
            renderSavedDevices();
        }

        function deleteDevice(index) {
            showCustomConfirm('이 디바이스를 삭제하시겠습니까?', () => {
                savedDevices.splice(index, 1);
                localStorage.setItem('wol_devices', JSON.stringify(savedDevices));
                renderSavedDevices();
            });
        }

        /**
         * DOM Render Pipeline
         */
        function renderSavedDevices() {
            const container = document.getElementById('savedDevicesContainer');
            container.innerHTML = ''; 

            savedDevices.forEach((device, index) => {
                const cardNode = document.createElement('div');
                cardNode.className = 'card';
                
                cardNode.innerHTML = `
                    <button class="icon-btn active" onclick="deleteDevice(${index})">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                        </svg>
                    </button>
                    
                    <div class="saved-name">${device.name}</div>
                    
                    <button class="action-btn" onclick="sendWolFromSaved(${index})">PC 켜기</button>
                `;
                
                container.appendChild(cardNode);
            });
        }
    </script>
</body>
</html>
